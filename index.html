<!DOCTYPE html>
<html lang="pt-BR">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="janela-imagem" class="escondido">

        <audio

    </div>
    <div id="janela-video" class="escondido">
        <img class="video-central" src="imgs/so_no_passinho.gif" alt="VEM NO PASSINHO">

    <script src="script.js"></script>

</html>
